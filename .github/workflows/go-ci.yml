name: Go CI

on:
  push:
    branches: [main]
    paths: ['go/**']
  pull_request:
    branches: [main]
    paths: ['go/**']

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.sum || (echo "go.sum not up to date — run 'go mod tidy'" && exit 1)

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 120s

      - name: Build binary (smoke test)
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o /tmp/reki ./cmd/rekipedia
          /tmp/reki --version
          /tmp/reki --help
          /tmp/reki scan --help
