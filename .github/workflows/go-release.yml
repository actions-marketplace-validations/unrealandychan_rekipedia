name: Go Release

on:
  push:
    tags:
      - 'go/v*'   # e.g. go/v1.2.3 — triggers Go binary release only

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Strip tag prefix for goreleaser
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${RAW_TAG#go/}
          CLEAN_TAG="v${VERSION#v}"
          echo "GORELEASER_CURRENT_TAG=${CLEAN_TAG}" >> $GITHUB_ENV
          # Create local semver tag so goreleaser can resolve it
          git tag "${CLEAN_TAG}"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean --skip=validate
          workdir: go
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew tap (Formula fallback)
        if: success()
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#go/v}
          echo "Updating homebrew tap for $TAG ..."
          python3 .github/scripts/update-homebrew-tap.py "$VERSION"
