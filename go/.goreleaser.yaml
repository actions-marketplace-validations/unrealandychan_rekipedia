version: 2

project_name: close-wiki

before:
  hooks:
    - go mod tidy

builds:
  - id: close-wiki
    main: ./cmd/close-wiki
    binary: close-wiki
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - RELEASE-NOTES.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: unrealandychan
    name: close-wiki
  name_template: "{{.ProjectName}} v{{.Version}}"
  draft: false
  prerelease: auto

brews:
  - name: close-wiki
    repository:
      owner: unrealandychan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: HermesBot
      email: bot@close-wiki.dev
    homepage: "https://github.com/unrealandychan/close-wiki"
    description: "Agentic repo-to-wiki — scan any codebase into a structured knowledge base"
    license: "MIT"
    install: |
      bin.install "close-wiki"
    test: |
      system "#{bin}/close-wiki", "--version"

nfpms:
  - id: packages
    package_name: close-wiki
    vendor: unrealandychan
    homepage: "https://github.com/unrealandychan/close-wiki"
    description: "Agentic repo-to-wiki — scan any codebase into a structured knowledge base"
    license: MIT
    maintainer: "unrealandychan <unrealandychan@users.noreply.github.com>"
    formats:
      - deb
      - rpm
      - apk
