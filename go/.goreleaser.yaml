version: 2

project_name: rekipedia

before:
  hooks:
    - go mod tidy

builds:
  - id: rekipedia
    main: ./cmd/rekipedia
    binary: reki
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - RELEASE-NOTES.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: unrealandychan
    name: rekipedia-releases
  name_template: "{{.ProjectName}} v{{.Version}}"
  draft: false
  prerelease: auto
  replace_existing_artifacts: true

homebrew_casks:
  - name: rekipedia
    url:
      template: "https://github.com/unrealandychan/rekipedia-releases/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    binaries:
      - reki
    repository:
      owner: unrealandychan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: HermesBot
      email: bot@rekipedia.dev
    directory: Casks
    homepage: "https://github.com/unrealandychan/rekipedia"
    description: "Agentic repo-to-wiki — scan any codebase into a structured knowledge base"
    skip_upload: false

nfpms:
  - id: packages
    package_name: rekipedia
    vendor: unrealandychan
    homepage: "https://github.com/unrealandychan/rekipedia"
    description: "Agentic repo-to-wiki — scan any codebase into a structured knowledge base"
    license: MIT
    maintainer: "unrealandychan <unrealandychan@users.noreply.github.com>"
    formats:
      - deb
      - rpm
      - apk
