{{template "base.html" .}}
{{define "title"}}Graph — rekipedia{{end}}
{{define "extra_head"}}
<style>
#graph-container {
  width: 100%;
  height: calc(100vh - 80px);
  background: #1a1a2e;
  border-radius: 10px;
  border: 1px solid #1e2a3a;
  position: relative;
  overflow: hidden;
}
#graph-svg { width: 100%; height: 100%; }
.node circle { stroke-width: 1.5px; cursor: pointer; }
.node text { font-size: 11px; fill: #e2e8f0; pointer-events: none; text-shadow: 0 1px 3px #000; }
.link { stroke: #334155; stroke-opacity: 0.5; stroke-width: 1px; }
#legend {
  position: absolute; top: 12px; right: 12px;
  background: rgba(17,24,39,0.92); border: 1px solid #1e2a3a;
  border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #9ca3af;
}
#legend h4 { font-size: 12px; color: #e2e8f0; margin-bottom: 6px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#graph-info { margin-bottom: 16px; }
#graph-info h1 { font-size: 1.5em; font-weight: 700; color: #f1f5f9; }
#graph-info p { color: #6b7280; font-size: 13px; margin-top: 4px; }
#node-count { color: #60a5fa; font-weight: 600; }
</style>
{{end}}
{{define "content"}}
<div id="graph-info">
  <h1>🕸 Dependency Graph</h1>
  <p>Interactive force-directed graph of symbols and relationships. <span id="node-count">Loading...</span></p>
</div>
<div id="graph-container">
  <svg id="graph-svg"></svg>
  <div id="legend">
    <h4>Legend</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div> Symbol node</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700;border:2px solid #ff9900"></div> God node (high connectivity)</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(async () => {
  const data = await fetch('/api/graph').then(r => r.json());
  const nodes = data.nodes || [];
  const edges = data.edges || [];

  document.getElementById('node-count').textContent =
    `${nodes.length} nodes · ${edges.length} edges`;

  if (nodes.length === 0) {
    document.getElementById('graph-container').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#4b5563;font-size:14px">No graph data yet — run <code style="background:#1e293b;padding:2px 6px;border-radius:4px;color:#7dd3fc">rekipedia scan</code> first.</div>';
    return;
  }

  const svg = d3.select('#graph-svg');
  const width = svg.node().clientWidth || 900;
  const height = svg.node().clientHeight || 600;

  // Build a map for link source/target resolution
  const nodeById = new Map(nodes.map(n => [n.id, n]));

  // Filter edges to only valid nodes
  const validEdges = edges.filter(e => nodeById.has(e.source) && nodeById.has(e.target));

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => g.attr('transform', e.transform)));

  const link = g.append('g')
    .selectAll('line')
    .data(validEdges)
    .join('line')
    .attr('class', 'link');

  const node = g.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r', d => d.is_god ? 12 : 7)
    .attr('fill', d => d.is_god ? '#ffd700' : '#22d3ee')
    .attr('stroke', d => d.is_god ? '#ff9900' : '#0e7490');

  node.append('text')
    .attr('dx', d => d.is_god ? 14 : 9)
    .attr('dy', '0.35em')
    .text(d => d.name.length > 20 ? d.name.slice(0, 18) + '…' : d.name);

  node.append('title').text(d => `${d.name} (${d.kind})${d.is_god ? ' ★ god node' : ''}`);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(validEdges).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(18))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
})();
</script>
{{end}}
