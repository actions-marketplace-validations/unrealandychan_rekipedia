{{define "title"}}{{.Title}} — rekipedia{{end}}
{{define "extra_head"}}
<style>
.wiki-content{max-width:820px}
.mermaid-wrapper{position:relative;margin:1.1em 0}
.mermaid-rendered{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;overflow-x:auto;text-align:center}
</style>
{{end}}
{{define "content"}}
<div style="margin-bottom:20px">
  <a href="/" class="btn btn-secondary" style="margin-bottom:16px">← Home</a>
  <h1>{{.Title}}</h1>
</div>
<div class="wiki-content">
  {{.Content}}
</div>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#0d1117', primaryColor: '#1f6feb', primaryTextColor: '#e6edf3',
      primaryBorderColor: '#30363d', lineColor: '#58a6ff', secondaryColor: '#161b22',
      tertiaryColor: '#1c2128', edgeLabelBackground: '#161b22', clusterBkg: '#1c2128',
      titleColor: '#e6edf3', nodeBorder: '#30363d', mainBkg: '#1c2128',
    }
  });

  function unescapeHtml(text) {
    const ta = document.createElement('textarea');
    ta.innerHTML = text;
    return ta.value;
  }

  document.querySelectorAll('pre code.language-mermaid, pre > code[class*="mermaid"]').forEach(async (codeEl, i) => {
    const definition = unescapeHtml(codeEl.textContent);
    const pre = codeEl.closest('pre');
    const id = `mermaid-diagram-${i}`;
    const wrapper = document.createElement('div');
    wrapper.className = 'mermaid-wrapper';
    const container = document.createElement('div');
    container.id = id;
    container.className = 'mermaid-rendered';
    const isRelationshipDiagram = /^(classDiagram|flowchart|graph)\b/m.test(definition.trim());
    if (isRelationshipDiagram) {
      const btn = document.createElement('a');
      btn.href = '/graph';
      btn.textContent = '🕸 Open in Graph';
      btn.style.cssText = 'position:absolute;top:8px;right:8px;font-size:0.75rem;background:#1f6feb;color:#fff;padding:3px 10px;border-radius:12px;text-decoration:none;z-index:10;';
      wrapper.appendChild(btn);
    }
    const toggleBtn = document.createElement('button');
    toggleBtn.textContent = '{ }';
    toggleBtn.style.cssText = 'position:absolute;top:8px;' + (isRelationshipDiagram ? 'right:130px' : 'right:8px') + ';font-size:0.7rem;background:#21262d;color:#7d8590;border:1px solid #30363d;padding:2px 8px;border-radius:12px;cursor:pointer;z-index:10;';
    const rawPre = document.createElement('pre');
    rawPre.style.cssText = 'display:none;margin:0;padding:1rem;background:#0d1117;border-radius:0 0 8px 8px;font-size:0.8em;text-align:left;border-top:1px solid #30363d;';
    rawPre.textContent = definition;
    toggleBtn.onclick = () => { rawPre.style.display = rawPre.style.display === 'none' ? 'block' : 'none'; };
    wrapper.appendChild(toggleBtn);
    wrapper.appendChild(container);
    wrapper.appendChild(rawPre);
    pre.replaceWith(wrapper);
    try {
      const { svg } = await mermaid.render(id + '_svg', definition);
      container.innerHTML = svg;
      const svgEl = container.querySelector('svg');
      if (svgEl) { svgEl.style.maxWidth = '100%'; svgEl.style.height = 'auto'; }
    } catch (err) {
      container.innerHTML = `<div style="color:#f85149;padding:1rem;text-align:left"><b>Mermaid error:</b><br><pre style="font-size:0.8em">${err.message}</pre></div>`;
      rawPre.style.display = 'block';
    }
  });
</script>
{{end}}
