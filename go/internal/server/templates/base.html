<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}rekipedia{{end}}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;background:#111827;display:flex;flex-direction:column;border-right:1px solid #1e2a3a;flex-shrink:0;overflow-y:auto}
#sidebar-header{padding:20px 16px 12px;border-bottom:1px solid #1e2a3a}
#sidebar-logo{font-size:18px;font-weight:700;color:#60a5fa;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
#sidebar-logo svg{flex-shrink:0}
#sidebar-nav{padding:12px 8px;flex:1}
#sidebar-nav .nav-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#4b5563;padding:8px 8px 4px;margin-top:8px}
#sidebar-nav a{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;color:#9ca3af;text-decoration:none;font-size:13.5px;margin-bottom:1px;transition:background .15s,color .15s}
#sidebar-nav a:hover{background:#1e2a3a;color:#e2e8f0}
#sidebar-nav a.active{background:#1d4ed8;color:#eff6ff;font-weight:500}
#sidebar-nav a .icon{opacity:.7;font-size:12px}
#sidebar-footer{padding:12px 16px;border-top:1px solid #1e2a3a;font-size:12px;color:#4b5563}
#sidebar-footer .repo-name{color:#6b7280;font-weight:600;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sidebar-footer .repo-path{font-size:11px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#content{flex:1;overflow-y:auto;padding:32px 40px;max-width:900px;width:100%}
@media(max-width:800px){#content{padding:20px 16px}}
/* Typography */
#content h1{font-size:1.9em;font-weight:700;color:#f1f5f9;margin-bottom:.5em}
#content h2{font-size:1.4em;font-weight:600;color:#e2e8f0;margin:1.5em 0 .5em;padding-bottom:.3em;border-bottom:1px solid #1e2a3a}
#content h3{font-size:1.1em;font-weight:600;color:#cbd5e1;margin:1.2em 0 .4em}
#content p{line-height:1.75;margin-bottom:1em;color:#d1d5db}
#content ul,#content ol{margin:.5em 0 1em 1.5em;color:#d1d5db;line-height:1.7}
#content li{margin-bottom:.25em}
#content code{background:#1e293b;border:1px solid #334155;padding:2px 6px;border-radius:4px;font-size:.85em;color:#7dd3fc;font-family:"JetBrains Mono","Fira Code",monospace}
#content pre{background:#0d1424;border:1px solid #1e2a3a;border-radius:8px;padding:16px;overflow-x:auto;margin-bottom:1.2em}
#content pre code{background:none;border:none;padding:0;color:#e2e8f0;font-size:.85em}
#content blockquote{border-left:3px solid #3b82f6;margin:1em 0;padding:.5em 1em;background:#111827;color:#9ca3af;border-radius:0 4px 4px 0}
#content a{color:#60a5fa;text-decoration:none}
#content a:hover{text-decoration:underline}
#content table{width:100%;border-collapse:collapse;margin-bottom:1.2em;font-size:.9em}
#content th{background:#111827;border:1px solid #1e2a3a;padding:8px 12px;text-align:left;color:#9ca3af;font-weight:600}
#content td{border:1px solid #1e2a3a;padding:8px 12px;color:#d1d5db}
#content tr:nth-child(even) td{background:#0d1117}
/* Cards */
.card{background:#111827;border:1px solid #1e2a3a;border-radius:10px;padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#111827;border:1px solid #1e2a3a;border-radius:10px;padding:16px 20px}
.stat-card .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#4b5563;margin-bottom:6px}
.stat-card .stat-value{font-size:24px;font-weight:700;color:#f1f5f9}
.stat-card .stat-sub{font-size:11px;color:#6b7280;margin-top:4px}
/* Btn */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13.5px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:background .15s}
.btn-primary{background:#2563eb;color:#eff6ff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#1e2a3a;color:#9ca3af;border:1px solid #334155}.btn-secondary:hover{background:#253347;color:#e2e8f0}
/* Page list */
.page-list{list-style:none;margin:0;padding:0}
.page-list li{border-bottom:1px solid #1e2a3a}
.page-list li:last-child{border-bottom:none}
.page-list a{display:flex;align-items:center;gap:10px;padding:10px 14px;color:#9ca3af;text-decoration:none;font-size:13.5px;border-radius:6px;transition:background .12s,color .12s}
.page-list a:hover{background:#1e2a3a;color:#e2e8f0}
.page-list a .page-num{font-size:11px;color:#4b5563;min-width:28px}
</style>
{{block "extra_head" .}}{{end}}
</head>
<body>
<nav id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      rekipedia
    </div>
  </div>
  <div id="sidebar-nav">
    <div class="nav-section">Navigation</div>
    <a href="/" {{if eq .ActivePage "home"}}class="active"{{end}}>
      <span class="icon">🏠</span> Home
    </a>
    <a href="/ask" {{if eq .ActivePage "ask"}}class="active"{{end}}>
      <span class="icon">💬</span> Ask
    </a>
    <a href="/graph" {{if eq .ActivePage "graph"}}class="active"{{end}}>
      <span class="icon">🕸</span> Graph
    </a>
    {{if .Sections}}
    {{range .Sections}}
    <div class="nav-section">{{.Title}}</div>
    {{range .Pages}}
    <a href="/wiki/{{.Slug}}" {{if eq $.ActiveSlug .Slug}}class="active"{{end}}>{{.Title}}</a>
    {{end}}
    {{end}}
    {{else if .Pages}}
    <div class="nav-section">Wiki Pages</div>
    {{range .Pages}}
    <a href="/wiki/{{.Slug}}" {{if eq $.ActiveSlug .Slug}}class="active"{{end}}>{{.Title}}</a>
    {{end}}
    {{end}}
  </div>
  <div id="sidebar-footer">
    <div class="repo-name">{{.RepoName}}</div>
    <div class="repo-path">{{.RepoPath}}</div>
  </div>
</nav>
<div id="main">
  <div id="content">
    {{block "content" .}}{{end}}
  </div>
</div>
</body>
</html>
