{% extends "base.html" %}
{% block content %}
<h1 style="color:#e6edf3;margin-bottom:1.5rem;font-size:1.5rem;font-weight:600">💬 Ask</h1>

<div class="ask-box">
  <input id="q-input" type="text" placeholder="How does authentication work?" autofocus>
  <div class="spinner" id="spinner"></div>
  <button id="ask-btn" onclick="submitQuestion()">Ask</button>
</div>

<div id="live-answer" style="display:none" class="qa-item">
  <div class="q" id="live-q"></div>
  <div class="prose" id="live-a"></div>
</div>

<div id="history">
{% for item in history %}
<div class="qa-item">
  <div class="q">{{ item.question }}</div>
  <div class="prose">{{ item.answer | safe }}</div>
  <div class="meta">{{ item.model }} · {{ item.created_at }}</div>
</div>
{% endfor %}
</div>

<script>
function simpleMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\n/g, '<br>');
}

async function submitQuestion() {
  const input = document.getElementById('q-input');
  const q = input.value.trim();
  if (!q) return;

  const btn = document.getElementById('ask-btn');
  const spinner = document.getElementById('spinner');
  const liveBox = document.getElementById('live-answer');
  const liveA = document.getElementById('live-a');

  btn.disabled = true;
  spinner.style.display = 'block';
  liveBox.style.display = 'block';
  document.getElementById('live-q').textContent = q;
  liveA.innerHTML = '<em style="color:var(--muted)">Thinking…</em>';

  let accumulated = '';
  let firstChunk = true;

  try {
    const url = '/ask/stream?question=' + encodeURIComponent(q);
    const es = new EventSource(url);

    es.onmessage = (e) => {
      if (e.data === '[DONE]') {
        es.close();
        btn.disabled = false;
        spinner.style.display = 'none';

        // Append to history
        const hist = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'qa-item';
        div.innerHTML =
          '<div class="q">' + q + '</div>' +
          '<div class="prose">' + simpleMarkdown(accumulated) + '</div>';
        hist.prepend(div);
        liveBox.style.display = 'none';
        input.value = '';
        return;
      }
      if (e.data.startsWith('[ERROR]')) {
        liveA.innerHTML = '<span style="color:#f85149">' + e.data + '</span>';
        es.close();
        btn.disabled = false;
        spinner.style.display = 'none';
        return;
      }
      // Unescape \n back to real newlines
      const chunk = e.data.replace(/\\n/g, '\n');
      accumulated += chunk;
      if (firstChunk) {
        liveA.innerHTML = '';
        firstChunk = false;
      }
      liveA.innerHTML = simpleMarkdown(accumulated);
      // Auto-scroll to bottom of live answer
      liveA.scrollIntoView({ block: 'end', behavior: 'smooth' });
    };

    es.onerror = () => {
      es.close();
      if (!accumulated) {
        liveA.innerHTML = '<span style="color:#f85149">Stream error — check server logs</span>';
      }
      btn.disabled = false;
      spinner.style.display = 'none';
    };

  } catch(e) {
    liveA.innerHTML = '<span style="color:#f85149">Request failed: ' + e.message + '</span>';
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

document.getElementById('q-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuestion();
});
</script>
{% endblock %}
