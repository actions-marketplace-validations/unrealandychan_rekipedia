# Harness CI Pipeline Template
# Runs build, lint, test, and publishes DORA metrics on every push.
#
# Usage:
#   1. Import this pipeline in your Harness project (Project → Pipelines → Import)
#   2. Replace <CONNECTOR_ID>, <DOCKER_REGISTRY>, and <IMAGE_NAME> placeholders
#   3. Set pipeline-level variables: ANTHROPIC_API_KEY (optional, for AI lint report)
#
# DORA Metrics tracked:
#   - Deployment Frequency  (CD stage trigger count)
#   - Lead Time for Changes (pipeline start → deploy success)
#   - Change Failure Rate   (verify stage failure %)
#   - Mean Time to Recovery (rollback trigger → healthy)

pipeline:
  name: CI — Build, Test & DORA
  identifier: ci_build_test_dora
  projectIdentifier: <YOUR_PROJECT>
  orgIdentifier: default
  tags:
    harness-engineering: "true"

  stages:
    - stage:
        name: Build & Lint
        identifier: build_lint
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install dependencies
                  identifier: install
                  spec:
                    connectorRef: <CONNECTOR_ID>
                    image: node:22-alpine
                    command: npm ci

              - step:
                  type: Run
                  name: Lint
                  identifier: lint
                  spec:
                    connectorRef: <CONNECTOR_ID>
                    image: node:22-alpine
                    command: npm run lint
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "reports/lint-*.xml"

              - step:
                  type: Run
                  name: Build
                  identifier: build
                  spec:
                    connectorRef: <CONNECTOR_ID>
                    image: node:22-alpine
                    command: npm run build

    - stage:
        name: Test
        identifier: test
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    connectorRef: <CONNECTOR_ID>
                    image: node:22-alpine
                    command: |
                      npm ci
                      npm test -- --coverage --reporter=junit --outputFile=reports/unit-test-results.xml
                    envVariables:
                      CI: "true"
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "reports/unit-test-results.xml"

              - step:
                  type: Run
                  name: Integration Tests
                  identifier: integration_tests
                  spec:
                    connectorRef: <CONNECTOR_ID>
                    image: node:22-alpine
                    command: |
                      npm run test:integration -- --reporter=junit --outputFile=reports/integration-results.xml
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "reports/integration-results.xml"
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore  # integration tests are advisory; don't block PR

    - stage:
        name: Publish Image
        identifier: publish_image
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build & Push Docker Image
                  identifier: push_image
                  spec:
                    connectorRef: <DOCKER_REGISTRY>
                    repo: <IMAGE_NAME>
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Dockerfile
                    optimize: true

  properties:
    ci:
      codebase:
        connectorRef: <CONNECTOR_ID>
        repoName: <YOUR_REPO>
        build:
          type: branch
          spec:
            branch: <+input>
